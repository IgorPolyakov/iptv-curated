name: build-playlist

on:
  schedule:
    - cron: '0 4 * * *'   # ежедневно 04:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['curate.py', '.github/workflows/build.yml']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate curated playlist
        run: python curate.py
      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --quiet -- curated.m3u; then
            git add curated.m3u
            git commit -m "chore: refresh curated.m3u [skip ci]"
            git push
          else
            echo "no changes"
          fi
